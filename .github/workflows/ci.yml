name: Windows C++23 Modules CI

on:
  push:
    branches:
      - main
      - 'recovery/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build (Windows, MSVC, C++23 modules)
    runs-on: windows-latest

    steps:
      - name: Check out source and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: >-
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DCNETMOD_USE_SYSTEM_DEPS=OFF
          -DCNETMOD_USE_MOLD=OFF
          -DCNETMOD_USE_MIMALLOC=OFF
          -DCNETMOD_ENABLE_SSL=OFF
          -DCNETMOD_ENABLE_LEVELDB=OFF
          -DCNETMOD_BUILD_TESTS=OFF
          -DCNETMOD_BUILD_BENCH=OFF
          -DCNETMOD_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix install

      - name: Upload install tree
        uses: actions/upload-artifact@v4
        with:
          name: cnetmod-windows-x64
          path: install
          if-no-files-found: error
